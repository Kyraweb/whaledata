server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve extensionless URLs — /why → why.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Clean 404 page
    error_page 404 /index.html;

    gzip on;
    gzip_types text/html text/css application/javascript;
}
