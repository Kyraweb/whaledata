<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}whaledata admin{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/admin.css" />
</head>
<body>
  <nav class="nav">
    <div class="nav-brand">
      <span class="nav-whale">🐋</span>
      <span class="nav-title">whaledata<span class="nav-tld">.org</span></span>
      <span class="nav-label">admin</span>
    </div>
    <div class="nav-links">
      <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
      <a href="/species" class="nav-link {% if request.url.path == '/species' %}active{% endif %}">Species</a>
      <a href="/logs" class="nav-link {% if request.url.path == '/logs' %}active{% endif %}">Sync Logs</a>
      <a href="/sync" class="nav-link {% if request.url.path == '/sync' %}active{% endif %}">Manual Sync</a>
    </div>
    <div class="nav-meta">
      <span class="nav-time">{{ now }}</span>
    </div>
  </nav>

  <main class="main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
