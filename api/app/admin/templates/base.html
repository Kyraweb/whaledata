<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}whaledata admin{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050810; --bg-card: #0d1528; --bg-input: #111d35;
      --cyan: #00e5ff; --cyan-dim: #00b8cc; --cyan-glow: rgba(0,229,255,0.08);
      --text: #e8f4f8; --muted: #7a9bb5; --dim: #3d5a72;
      --border: rgba(0,229,255,0.1); --border-hi: rgba(0,229,255,0.25);
      --green: #00c97a; --red: #ff5a5a; --orange: #ff9f43;
      --font: 'Syne', sans-serif; --mono: 'DM Mono', monospace;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }
    a { color: var(--cyan-dim); text-decoration: none; }
    a:hover { color: var(--cyan); }

    /* Nav */
    nav { display: flex; align-items: center; gap: 8px; padding: 0 28px; height: 54px; background: rgba(8,13,26,0.97); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .brand { display: flex; align-items: center; gap: 8px; margin-right: 16px; }
    .brand-title { font-size: 15px; font-weight: 700; }
    .brand-tld { color: var(--cyan); }
    .badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; background: var(--cyan-glow); border: 1px solid var(--border-hi); color: var(--cyan); text-transform: uppercase; letter-spacing: 0.1em; }
    .nav-link { padding: 6px 14px; border-radius: 8px; color: var(--muted); font-size: 13px; transition: all 0.15s; }
    .nav-link:hover, .nav-link.active { background: var(--cyan-glow); color: var(--text); }
    .nav-time { margin-left: auto; font-size: 11px; color: var(--dim); font-family: var(--mono); }

    /* Layout */
    main { padding: 32px 28px; max-width: 1200px; margin: 0 auto; }
    .page-hdr { margin-bottom: 24px; }
    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: var(--muted); }

    /* Cards */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; text-align: center; }
    .card-val { font-size: 26px; font-weight: 700; color: var(--cyan); font-family: var(--mono); line-height: 1; margin-bottom: 6px; }
    .card-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

    /* Section */
    .section { margin-bottom: 36px; }
    .section-title { font-size: 11px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 12px; }

    /* Table */
    .tbl { width: 100%; border-collapse: collapse; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .tbl th { padding: 9px 14px; text-align: left; font-size: 10px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2); }
    .tbl td { padding: 9px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: var(--cyan-glow); }

    /* Tags */
    .tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; font-family: var(--mono); }
    .tag.gbif { background: rgba(0,229,255,0.1); color: var(--cyan); border: 1px solid rgba(0,229,255,0.2); }
    .tag.obis { background: rgba(77,159,255,0.1); color: #4d9fff; border: 1px solid rgba(77,159,255,0.2); }
    .tag.success { background: rgba(0,201,122,0.1); color: var(--green); border: 1px solid rgba(0,201,122,0.2); }
    .tag.running { background: rgba(255,159,67,0.1); color: var(--orange); border: 1px solid rgba(255,159,67,0.2); }
    .tag.failed  { background: rgba(255,90,90,0.1); color: var(--red); border: 1px solid rgba(255,90,90,0.2); }
    .tag.lc { background: rgba(0,180,100,0.15); color: #00b464; border: 1px solid rgba(0,180,100,0.3); }
    .tag.en { background: rgba(255,140,0,0.15); color: #ff8c00; border: 1px solid rgba(255,140,0,0.3); }
    .tag.vu { background: rgba(255,200,0,0.15); color: #ffc800; border: 1px solid rgba(255,200,0,0.3); }
    .tag.dd { background: rgba(150,150,180,0.15); color: #9696b4; border: 1px solid rgba(150,150,180,0.3); }

    /* Util */
    .mono { font-family: var(--mono); }
    .muted { color: var(--muted); }
    .green { color: var(--green); }
    .red   { color: var(--red); }
    .italic { font-style: italic; }
    .empty { text-align: center; color: var(--dim); padding: 24px; }

    /* Alert */
    .alert { padding: 10px 16px; border-radius: 8px; margin-bottom: 18px; font-size: 13px; }
    .ok  { background: rgba(0,201,122,0.1); border: 1px solid rgba(0,201,122,0.3); color: var(--green); }
    .err { background: rgba(255,90,90,0.1); border: 1px solid rgba(255,90,90,0.3); color: var(--red); }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 8px; font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; border: 1px solid; }
    .btn-cyan { background: var(--cyan-glow); border-color: var(--border-hi); color: var(--cyan); }
    .btn-cyan:hover { background: rgba(0,229,255,0.15); }
    .btn-ghost { background: none; border-color: var(--border); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--border-hi); color: var(--text); }
    .btn-sm { padding: 4px 12px; font-size: 11px; }
    .btn-danger { background: rgba(255,90,90,0.08); border-color: rgba(255,90,90,0.2); color: var(--red); }
    .btn-danger:hover { background: rgba(255,90,90,0.15); }

    /* Form */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .form-ctrl { background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; width: 100%; transition: border 0.15s; }
    .form-ctrl:focus { border-color: var(--border-hi); }
    .form-ctrl[readonly] { opacity: 0.5; }
    .form-ctrl option { background: var(--bg-card); }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
    .filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
    .filter-row .form-ctrl { max-width: 200px; }

    /* Modal */
    .modal-wrap { display: none; position: fixed; inset: 0; z-index: 500; align-items: center; justify-content: center; }
    .modal-wrap.open { display: flex; }
    .modal-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
    .modal-box { position: relative; background: var(--bg-card); border: 1px solid var(--border-hi); border-radius: 14px; padding: 24px; width: 460px; max-width: 90vw; z-index: 1; }
    .modal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .modal-hdr h3 { font-size: 15px; font-weight: 700; }
    .modal-close { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); width: 28px; height: 28px; cursor: pointer; font-size: 14px; }

    /* Sync output */
    .sync-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
    .sync-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .sync-card-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .sync-card-sub { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
    .sync-output { display: none; margin-top: 14px; padding: 12px; background: #020408; border: 1px solid var(--border); border-radius: 8px; font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: pre-wrap; max-height: 280px; overflow-y: auto; line-height: 1.6; }
    .sync-output.err-out { border-color: rgba(255,90,90,0.3); color: var(--red); }

    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }
  </style>
</head>
<body>
  <nav>
    <div class="brand">
      <span>🐋</span>
      <span class="brand-title">whaledata<span class="brand-tld">.org</span></span>
      <span class="badge">admin</span>
    </div>
    <a href="/admin/" class="nav-link {% if request.url.path == '/admin/' or request.url.path == '/admin' %}active{% endif %}">Dashboard</a>
    <a href="/admin/species" class="nav-link {% if '/species' in request.url.path %}active{% endif %}">Species</a>
    <a href="/admin/sightings" class="nav-link {% if '/sightings' in request.url.path %}active{% endif %}">Sightings</a>
    <a href="/admin/logs" class="nav-link {% if '/logs' in request.url.path %}active{% endif %}">Sync Logs</a>
    <a href="/admin/sync" class="nav-link {% if '/sync' in request.url.path %}active{% endif %}">Manual Sync</a>
    <a href="/admin/subscribers" class="nav-link {% if '/subscribers' in request.url.path %}active{% endif %}">Subscribers</a>
    <span class="nav-time">{{ now }}</span>
  </nav>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
